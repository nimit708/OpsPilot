services:
  - type: web
    name: opspilot
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: EXTERNAL_HTTPS
        value: true
      - key: SECURE_COOKIES
        value: true
      - key: TLS_CERT_PATH
        value: ""
      - key: TLS_KEY_PATH
        value: ""
      - key: APP_MODE
        value: production
      - key: SCHEDULER_ENABLED
        value: true
      - key: POLL_INTERVAL_MS
        value: 120000
